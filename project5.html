<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 5: Image Slider/Carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        #slider {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        button {
            padding: 0.5rem 1rem;
            margin: 0 0.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Image Slider/Carousel</h1>
    <p>An image carousel that changes every 3 seconds or on button click.</p>
    <img id="slider" src="https://picsum.photos/300?1">
    <br>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
    <br>
    <a href="index.html">Back to Portfolio</a>

    <script>
        let imgs = ["https://picsum.photos/300?1", "https://picsum.photos/300?2", "https://picsum.photos/300?3"];
        let i = 0, slideInt;

        function startSlider() {
            clearInterval(slideInt);
            slider.src = imgs[i];
            slideInt = setInterval(next, 3000);
        }

        function next() {
            i = (i + 1) % 3;
            slider.src = imgs[i];
        }

        function prev() {
            i = (i - 1 + 3) % 3;
            slider.src = imgs[i];
        }

        startSlider();
    </script>
</body>
</html>
