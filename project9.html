<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 9: Registration Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input {
            padding: 0.5rem;
            font-size: 1rem;
        }
        button {
            padding: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        #submit {
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        #submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Registration Form</h1>
    <p>A form with validation, captcha, and password visibility toggle.</p>
    <form id="regForm">
        <input id="email" type="email" placeholder="Email" required>
        <input id="phone" type="tel" placeholder="Phone" required>
        <div>
            <input id="pass" type="password" placeholder="Password" required>
            <button type="button" onclick="togglePass()">👁</button>
        </div>
        <input id="cpass" type="password" placeholder="Confirm Password" required>
        <div>
            <span id="capText"></span>
            <input id="capInput" placeholder="Captcha" required>
        </div>
        <button id="submit" type="submit" disabled>Submit</button>
    </form>
    <a href="index.html">Back to Portfolio</a>

    <script>
        let captcha;

        function genCap() {
            captcha = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('capText').textContent = captcha;
        }

        function togglePass() {
            const pass = document.getElementById('pass');
            const cpass = document.getElementById('cpass');
            pass.type = pass.type === 'password' ? 'text' : 'password';
            cpass.type = cpass.type === 'password' ? 'text' : 'password';
        }

        function checkForm() {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const cpass = document.getElementById('cpass').value;
            const capInput = document.getElementById('capInput').value;
            const submit = document.getElementById('submit');

            submit.disabled = !(email && phone && pass && cpass && pass === cpass && capInput.toUpperCase() === captcha);
        }

        document.getElementById('regForm').addEventListener('input', checkForm);
        genCap();
    </script>
</body>
</html>
