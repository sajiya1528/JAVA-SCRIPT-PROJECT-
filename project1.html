<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1: Dynamic Text Addition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        #myDiv {
            border: 1px solid #ddd;
            min-height: 100px;
            padding: 1rem;
            margin: 1rem 0;
            background-color: #f9f9f9;
        }
        button {
            padding: 0.5rem 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Dynamic Text Addition</h1>
    <p>Create an empty div and add a paragraph with text using JavaScript.</p>
    <div id="myDiv"></div>
    <button onclick="addPara()">Add Text</button>
    <br>
    <a href="index.html">Back to Portfolio</a>

    <script>
        function addPara() {
            let p = document.createElement("p");
            p.innerText = "This paragraph was added dynamically using JavaScript!";
            myDiv.appendChild(p);
        }
    </script>
</body>
</html>
