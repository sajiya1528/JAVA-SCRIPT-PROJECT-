<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 7: Timer App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        input {
            padding: 0.5rem;
            font-size: 1rem;
            margin: 1rem;
            width: 200px;
        }
        button {
            padding: 0.5rem 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        #timerDisplay {
            font-size: 3rem;
            margin: 2rem 0;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Timer App</h1>
    <p>A countdown timer with default value and user input option.</p>
    <input id="timeInput" placeholder="Seconds (default 10)">
    <br>
    <button onclick="startTimer()">Start</button>
    <div id="timerDisplay">10</div>
    <a href="index.html">Back to Portfolio</a>

    <script>
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            let input = document.getElementById("timeInput").value;
            let time = input ? parseInt(input) : 10;
            let display = document.getElementById("timerDisplay");
            display.textContent = time;

            timerInterval = setInterval(() => {
                time--;
                display.textContent = time;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's up!");
                }
            }, 1000);
        }
    </script>
</body>
</html>
